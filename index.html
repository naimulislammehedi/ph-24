<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="shortcut icon" href="./assets/logo.png">

    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[200px] mx-auto pt-32">
        <img src="./assets/Logo-full.png" alt="">
    </div>

    <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Mobile Number</label>
                    <input maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200"
                        placeholder="Enter you 11 digit number" id="input-number" value="01234567890" />

                    <br>

                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input type="password" class="input input rounded-full bg-base-200" placeholder="Enter 4 Digit Pin"
                        maxlength="4" id="input-pin" />
                    <div><a class="link link-hover">Forgot password?</a></div>
                    <button class="btn btn-primary mt-4 rounded-full" id="login-btn">Login</button>
                </fieldset>
            </div>
        </div>
    </div>

    <script src="./script/login.js"></script>
</body>

</html>
